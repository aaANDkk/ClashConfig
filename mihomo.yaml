rules:
  # 禁用 QUIC 流量
  - AND,((NETWORK,UDP),(DST-PORT,443),(NOT,((OR,((RULE-SET,cn_additional),(RULE-SET,cn_ip,no-resolve)))))),REJECT
  
  # 直连 
  - RULE-SET,private,DIRECT
  - RULE-SET,private_ip,DIRECT,no-resolve
  - RULE-SET,games_cn,DIRECT # 已包含 steam 下载域名
  - RULE-SET,epicgames,DIRECT
  - DOMAIN,fsend.cn,DIRECT           

  # 广告拦截
  - RULE-SET,adblockmihomolite,AdGuard

  # 手动附加域名分流
  - PROCESS-NAME,com.openai.chatgpt,AI
  - PROCESS-NAME,com.anthropic.claude,AI
  - PROCESS-NAME,ai.x.grok,AI
  - PROCESS-NAME,com.google.android.apps.bard,AI
  - PROCESS-NAME,com.czy0729.bangumi,Anime
  - PROCESS-NAME,com.ynwtandroid.fork.xl,Anime
  - PROCESS-NAME,com.predidit.kazumi,Anime
  - PROCESS-NAME,me.him188.ani,Anime
  - PROCESS-NAME,com.ligg.anime_flow,Anime
  - PROCESS-NAME,ani.baka,Anime
  - DOMAIN-SUFFIX,cycani.org,Anime
  - DOMAIN-SUFFIX,agedm.io,Anime
  - DOMAIN-KEYWORD,cycani,Anime
  - DOMAIN-KEYWORD,agedm,Anime
  
  - DOMAIN,msmp.abchina.com.cn,REJECT #农业银行

  # 核心代理规则（域名规则集） 
  - RULE-SET,ai,AI
  - RULE-SET,tiktok,TikTok
  - RULE-SET,bahamut,Anime
  - RULE-SET,niconico,Anime
  - RULE-SET,netflix,Media
  - RULE-SET,emby,Media
  - RULE-SET,youtube,Media
  - RULE-SET,hbo,Media
  - RULE-SET,disney,Media
  
  - RULE-SET,netflix_ip,Media,no-resolve  

  # 防线与兜底
  - RULE-SET,google,Proxy
  - RULE-SET,steam,Proxy
  - RULE-SET,gfw,Proxy  
  - RULE-SET,cn,DIRECT
  - RULE-SET,cn_additional,DIRECT
  - RULE-SET,cn_ip,DIRECT  
  
  - MATCH,Others          
