######### 🚀 锚点定义区域 start #######
# 1. 统一所有功能分流组的可选节点队列
pr: &pr {type: select, proxies: [Proxy, Bypass, Unlock, Global, Hong Kong, Taiwan, Japan, Korea, Singapore, United States]}

# 2. 统一订阅源的高级健康检查参数
p: &p
  type: http
  interval: 86400  
  health-check:
    enable: true
    lazy: true
    url: "https://www.gstatic.com/generate_204"
    interval: 10800
    timeout: 3000               
    #concurrency: 5

# 3. 自动化策略组基准模板（纯测速）
ut: &ut {type: url-test, tolerance: 70, interval: 600, timeout: 3000, lazy: true, url: "https://www.gstatic.com/generate_204", hidden: true, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png"}

# 4. 声明规则
anchors:
  _domain_anchor: &rule_providers_domain { type: http, interval: 86400, behavior: domain }
  _ip_anchor: &rule_providers_ip { type: http, interval: 86400, behavior: ipcidr }
  _classical_anchor: &rule_providers_classical { type: http, interval: 86400, behavior: classical }

# 5. DNS 统一锚点
chinaDNS:
  &chinaDNS [
    'https://dns.alidns.com/dns-query#DIRECT', 
    'https://doh.pub/dns-query#DIRECT'
  ]
foreignDNS:
  &foreignDNS [
    'https://dns.cloudflare.com/dns-query#Proxy',
    'https://dns.google/dns-query#Proxy'
  ]

# 6. 定义全局排除配置块（用于从源头过滤官网、流量、Web等信息）
global_exclude_filter: &global_exclude_filter { exclude-filter: '官网|Web|重置|到期|剩余|流量|机场|客服|套餐|订阅|版本' }

# 7. 统一过滤器
fhk: &fhk '🇭🇰|港|HK|[Hh]ong\s*[Kk]ong'
ftw: &ftw '🇹🇼|台湾|TW|[Tt]aiwan'
fjp: &fjp '🇯🇵|日本|JP|[Jj]apan'
fkr: &fkr '🇰🇷|韩|韩国|首尔|KR|[Kk]orea'
fsg: &fsg '🇸🇬|新加坡|狮城|SG|[Ss]ingapore'
fus: &fus '🇺🇸|美|US|[Aa]merica|[Uu]nited\s*[Ss]tates'
fot: &fot '(?i)^(?!.*(🇭🇰|🇹🇼|🇯🇵|🇺🇸|🇸🇬|🇰🇷|🇨🇳|港|hk|hong\s*kong|台|tw|taiwan|日|jp|japan|韩|kr|korea|新加坡|sg|singapore|美|us|united\s*states)).+$'
fjs: &fjs '解锁|解|原生|家庭|家宽|住宅|(?<![a-zA-Z])ai(?![a-zA-Z])|gpt|openai|claude|netflix|nf|hulu|disney|hbo|ISP|Home|HINET|HKT|play|🏠'
######### 🚀 锚点定义区域 end #######

proxy-providers:
    
  P1:
    <<: [*p, *global_exclude_filter]
    url: "填入订阅地址"
    override:
      additional-prefix: "[P1]"
      
  P2:
    <<: [*p, *global_exclude_filter]
    url: "填入订阅地址"
    override:
      additional-prefix: "[P2]"

proxies: []

ipv6: false
allow-lan: true
unified-delay: true
tcp-concurrent: true
reset-network-change: true
auto-detect-interface: true
udp-timeout: 30          
tcp-keep-alive-idle: 600        
keep-alive-interval: 60
bind-address: '*'
find-process-mode: strict
mode: rule     
external-controller: 127.0.0.1:9090
external-ui: ./ui
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

profile:
  store-selected: true
  store-fake-ip: true
  disconnect-on-policy-change: true 

dns:
  enable: true
  use-hosts: true
  use-system-hosts: true
  ipv6: false
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter: ['rule-set:private', 'rule-set:fakeip_filter']
  proxy-server-nameserver: *chinaDNS
  default-nameserver: ['223.5.5.5', '119.29.29.29']
  nameserver: *foreignDNS
  nameserver-policy:
    'rule-set:cn': *chinaDNS
  direct-nameserver: ['system', '223.5.5.5', '119.29.29.29']
 
hosts:
  'dns.alidns.com': ['223.5.5.5', '223.6.6.6']
  'doh.pub': ['1.12.12.12', '120.53.53.53']
  'dns.cloudflare.com': ['1.1.1.1', '1.0.0.1']
  'dns.google': ['8.8.8.8', '8.8.4.4']

  # 解决谷歌商店无法下载的问题
  'services.googleapis.cn': ['services.googleapis.com']

  # 屏蔽哔哩哔哩PCDN，解决访问视频卡顿问题
  '+.mcdn.bilivideo.com': ['0.0.0.0']
  '+.mcdn.bilivideo.cn': ['0.0.0.0']
  
ntp:
  enable: true
  write-to-system: false
  server: 'ntp.aliyun.com'
  port: 123
  interval: 60

tun:
  enable: true
  auto-route: true
  strict-route: true
  auto-redirect: true
  auto-detect-interface: true
  stack: system
  dns-hijack: ['udp://any:53', 'tcp://any:53']

proxy-groups:
  # ==================== 核心组 ====================
  - name: Proxy
    type: select
    proxies: [Unlock, Global, Hong Kong, Taiwan, Japan, Korea, Singapore, United States]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png"
    
  - name: Bypass
    type: select
    proxies: [DIRECT]
    url: 'https://connectivitycheck.platform.hicloud.com/generate_204'
    interval: 10800
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Bypass.png"
    hidden: true

  # ==================== 功能分流 ====================
  - {name: AI, <<: *pr, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ChatGPT.png"}
  - {name: YouTube, <<: *pr, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png"}
  - {name: TikTok, <<: *pr, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/TikTok.png"}
  - {name: NETFLIX, <<: *pr, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Netflix.png"}
  - {name: Emby, <<: *pr, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Emby.png"}
  - {name: Anime, <<: *pr, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Bahamut.png"}
  - {name: Niconico, <<: *pr, icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/niconico.png"}
  
  - name: Others
    type: select
    proxies: [Proxy, Bypass]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Final.png"
    
  # ==================== 后台测速组 ====================
  - {name: "UL-Auto", <<: *ut, include-all: true, filter: *fjs, exclude-type: Hysteria2} 
  - {name: "GB-Auto", <<: *ut, include-all: true, filter: *fot, exclude-type: Hysteria2}
  - {name: "HK-Auto", <<: *ut, include-all: true, filter: *fhk, exclude-type: Hysteria2}
  - {name: "TW-Auto", <<: *ut, include-all: true, filter: *ftw, exclude-type: Hysteria2}
  - {name: "JP-Auto", <<: *ut, include-all: true, filter: *fjp, exclude-type: Hysteria2}
  - {name: "KR-Auto", <<: *ut, include-all: true, filter: *fkr, exclude-type: Hysteria2}
  - {name: "SG-Auto", <<: *ut, include-all: true, filter: *fsg, exclude-type: Hysteria2}
  - {name: "US-Auto", <<: *ut, include-all: true, filter: *fus, exclude-type: Hysteria2}
  
  # ==================== 地区显式选择组 ====================
  - {name: Unlock, type: select, include-all: true, filter: *fjs, proxies: ["UL-Auto"], icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Static.png"}
  - {name: Global, type: select, include-all: true, filter: *fot, proxies: ["GB-Auto"], icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png"}
  - {name: Hong Kong, type: select, include-all: true, filter: *fhk, proxies: ["HK-Auto"], icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png"}
  - {name: Taiwan, type: select, include-all: true, filter: *ftw, proxies: ["TW-Auto"], icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png"}
  - {name: Japan, type: select, include-all: true, filter: *fjp, proxies: ["JP-Auto"], icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png"}
  - {name: Korea, type: select, include-all: true, filter: *fkr, proxies: ["KR-Auto"], icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Korea.png"}
  - {name: Singapore, type: select, include-all: true, filter: *fsg, proxies: ["SG-Auto"], icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png"}
  - {name: United States, type: select, include-all: true, filter: *fus, proxies: ["US-Auto"], icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png"}

# ==================== Rule Providers ====================
rule-providers:  
  private: { <<: *rule_providers_domain, format: mrs, url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/private.mrs", path: "./ruleset/private.mrs" }
  private_ip: { <<: *rule_providers_ip, format: mrs, url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/private.mrs", path: "./ruleset/private_ip.mrs" }
  fakeip_filter: { <<: *rule_providers_domain, format: mrs, url: "https://fastly.jsdelivr.net/gh/wwqgtxx/clash-rules@release/fakeip-filter.mrs", path: "./ruleset/fakeip-filter.mrs" }
  ai: { <<: *rule_providers_domain, format: mrs, url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/category-ai-!cn.mrs", path: "./ruleset/ai.mrs" }
  youtube: { <<: *rule_providers_domain, format: mrs, url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/youtube.mrs", path: "./ruleset/youtube.mrs" }
  tiktok: { <<: *rule_providers_domain, format: mrs, url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/tiktok.mrs", path: "./ruleset/tiktok.mrs" }
  netflix: { <<: *rule_providers_domain, format: mrs, url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/netflix.mrs", path: "./ruleset/netflix.mrs" }
  emby: { <<: *rule_providers_domain, format: mrs, url: "https://fastly.jsdelivr.net/gh/666OS/rules@release/mihomo/domain/Emby.mrs", path: "./ruleset/emby.mrs" }
  bahamut: { <<: *rule_providers_domain, format: mrs, url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/bahamut.mrs", path: "./ruleset/bahamut.mrs" }
  niconico: { <<: *rule_providers_domain, format: mrs, url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/niconico.mrs", path: "./ruleset/niconico.mrs" }
  gfw: { <<: *rule_providers_domain, format: mrs, url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/gfw.mrs", path: "./ruleset/gfw.mrs" }
  cn: { <<: *rule_providers_domain, format: mrs, url: "https://fastly.jsdelivr.net/gh/wwqgtxx/clash-rules@release/direct.mrs", path: "./ruleset/cn.mrs" }
  cn_additional: { <<: *rule_providers_domain, format: mrs, url: "https://static-file-global.353355.xyz/rules/cn-additional-list.mrs", path: "./ruleset/cn-additional-list.mrs" }
  cn_ip: { <<: *rule_providers_ip, format: mrs, url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geoip/cn.mrs", path: "./ruleset/cn_ip.mrs" }
  DownloadApps: { <<: *rule_providers_classical, format: yaml, url: "https://fastly.jsdelivr.net/gh/AIsouler/MyClash@main/Rules/DownloadApps.txt", path: "./ruleset/DownloadApps.txt" }

rules:
  # 禁用 QUIC 流量
  - AND,((NETWORK,UDP),(DST-PORT,443),(NOT,((OR,((RULE-SET,cn_additional),(RULE-SET,cn_ip,no-resolve)))))),REJECT-DROP
  
  # 私有网络与局域网直连 
  - RULE-SET,private,DIRECT
  - RULE-SET,private_ip,DIRECT,no-resolve
  - RULE-SET,DownloadApps,DIRECT  
  - DOMAIN,fsend.cn,DIRECT           

  # 手动附加域名分流
  - PROCESS-NAME,com.openai.chatgpt,AI
  - PROCESS-NAME,com.anthropic.claude,AI
  - PROCESS-NAME,ai.x.grok,AI
  - PROCESS-NAME,com.google.android.apps.bard,AI
  - DOMAIN-SUFFIX,cycani.org,Anime
  - DOMAIN-SUFFIX,agedm.io,Anime
  - DOMAIN-KEYWORD,cycani,Anime
  - DOMAIN-KEYWORD,agedm,Anime

  # 核心代理规则（域名规则集） 
  - RULE-SET,youtube,YouTube
  - RULE-SET,ai,AI
  - RULE-SET,tiktok,TikTok
  - RULE-SET,niconico,Niconico
  - RULE-SET,bahamut,Anime
  - RULE-SET,netflix,NETFLIX
  - RULE-SET,emby,Emby

  # 墙内安全防线与兜底
  - RULE-SET,gfw,Proxy  
  - RULE-SET,cn_ip,DIRECT  
  - RULE-SET,cn_additional,DIRECT
  
  - MATCH,Others          
